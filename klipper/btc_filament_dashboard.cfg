#####################################################################
# BTC Filament Dashboard - Klipper Event Bridge
#
# Include this file from printer.cfg or btc2 main config:
#   [include btc2/features/btc_filament_dashboard.cfg]
#
# Requires Klipper G-Code Shell Command extension:
#   gcode_shell_command.py in ~/klipper/klippy/extras/
#
# Sends low-traffic BTC tool events to:
#   http://127.0.0.1:7131/api/event
#####################################################################

[gcode_shell_command btc_dash_event]
command: /home/biqu/printer_data/config/btc2/features/btc_dashboard/btc_dash_event.sh
timeout: 2.
verbose: False


[gcode_macro BTC_DASH_EVENT]
description: Send one BTC tool/filament event to the BTC Filament Dashboard
gcode:
  {% set tool          = params.TOOL|default("")|string %}
  {% set event         = params.EVENT|default("manual")|string %}
  {% set state         = params.STATE|default("")|string %}
  {% set message       = params.MESSAGE|default("")|string %}
  {% set spool_id      = params.SPOOL_ID|default("")|string %}
  {% set mdm_state     = params.MDM_STATE|default("")|string %}
  {% set filament_mm   = params.FILAMENT_MM|default("")|string %}
  {% set old_tool      = params.OLD_TOOL|default("")|string %}
  {% set new_tool      = params.NEW_TOOL|default("")|string %}
  {% set progress      = params.PROGRESS|default("")|string %}
  {% set layer         = params.LAYER|default("")|string %}
  {% set printing_time = params.PRINTING_TIME|default("")|string %}
  {% set print_rate    = params.PRINT_RATE_MMS|default("")|string %}
  {% set this_print_m  = params.THIS_PRINT_M|default("")|string %}
  {% set print_start_m = params.PRINT_START_M|default("")|string %}

  # Keep shell params simple. Use underscores instead of spaces.
  {% set event         = event|replace(" ", "_") %}
  {% set state         = state|replace(" ", "_") %}
  {% set message       = message|replace(" ", "_") %}
  {% set mdm_state     = mdm_state|replace(" ", "_") %}
  {% set layer         = layer|replace(" ", "_") %}
  {% set printing_time = printing_time|replace(" ", "_") %}

  RUN_SHELL_COMMAND CMD=btc_dash_event PARAMS="event={event} tool={tool} state={state} message={message} spool_id={spool_id} mdm_state={mdm_state} filament_mm={filament_mm} old_tool={old_tool} new_tool={new_tool} progress={progress} layer={layer} printing_time={printing_time} print_rate_mms={print_rate} this_print_m={this_print_m} print_start_m={print_start_m}"


[gcode_macro BTC_DASH_PICKUP]
description: Mark a tool as picked up and active on the dashboard
gcode:
  {% set tool = params.TOOL|default(params.T|default(""))|string %}
  BTC_DASH_EVENT TOOL={tool} EVENT=pickup STATE=active MDM_STATE=moving MESSAGE=on_carriage


[gcode_macro BTC_DASH_DROPOFF]
description: Mark a tool as dropped off/ready on the dashboard
gcode:
  {% set tool = params.TOOL|default(params.T|default(""))|string %}
  BTC_DASH_EVENT TOOL={tool} EVENT=dropoff STATE=ready MDM_STATE=idle MESSAGE=docked


[gcode_macro BTC_DASH_TOOLCHANGE]
description: Mark old/new tool after a successful BTC toolchange
gcode:
  {% set old_tool = params.OLD_TOOL|default("")|string %}
  {% set new_tool = params.NEW_TOOL|default(params.TOOL|default(params.T|default("")))|string %}
  BTC_DASH_EVENT TOOL={new_tool} EVENT=toolchange_done OLD_TOOL={old_tool} NEW_TOOL={new_tool} STATE=active MDM_STATE=moving MESSAGE=ready
